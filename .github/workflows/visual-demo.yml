name: Visual Demo Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build a visual summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Flash Group Visual Demo

          ## Quality gate flow

          ```mermaid
          flowchart LR
              A[Checkout] --> B[Build]
              B --> C[Quality Gate 1]
              C --> D[Quality Gate 2]
              D --> E[Ship]
          ```

          | Stage | Signal | What it means |
          | --- | --- | --- |
          | Build | green | the demo compiles cleanly |
          | Gate 1 | green | the first quality check passes |
          | Gate 2 | green | the next gate confirms the visual |
          | Ship | ready | the workflow is good to publish |

          Build → Gate 1 → Gate 2 → Ship

          EOF

          printf '%s\n' '========================================'
          printf '%s\n' '   FLASH GROUP VISUAL PIPELINE ONLINE   '
          printf '%s\n' '========================================'
          echo "Visual demo step completed."

      - name: Emit workflow notice
        run: echo "::notice title=Visual Pipeline::The job summary above is the visual confirmation for this demo."