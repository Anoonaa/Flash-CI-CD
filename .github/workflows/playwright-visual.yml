name: Playwright Visual Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run the local React build
        run: npm run build

      - name: Run the Playwright smoke test
        run: npm run test:e2e -- --project=chromium

      - name: Summarize the result
        if: always()
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Playwright Smoke Check

          ## Visual gate flow

          ```mermaid
          flowchart LR
              A[Build] --> B[Browser Gate]
              B --> C[Visual Check]
              C --> D[Artifact Upload]
          ```

          | Stage | Signal | What it means |
          | --- | --- | --- |
          | Build | green | the React app bundles successfully |
          | Browser Gate | green | Chromium opens the demo page |
          | Visual Check | green | the button click and screenshot pass |
          | Artifact Upload | ready | the report is saved for review |

          Build → Browser Gate → Visual Check → Artifact Upload

          EOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7